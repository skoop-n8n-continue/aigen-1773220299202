<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="manifest" href="./manifest.json">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>The Elevated Experience - Promo Animation</title>

  <!-- GSAP Core + Plugins -->
  <script src="https://cdn.jsdelivr.net/npm/gsap@3/dist/gsap.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/gsap@3/dist/SplitText.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/gsap@3/dist/CustomEase.min.js"></script>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,300;0,700;0,900;1,400&family=Roboto+Mono:wght@500;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="style.css?v=xyz123">
</head>
<body>
  <div id="scene">
    <!-- Layer 1: Background -->
    <div id="background"></div>

    <!-- Layer 2: Mid Background (Smoke) -->
    <div id="background-effects">
      <div class="smoke-layer smoke-1"></div>
      <div class="smoke-layer smoke-2"></div>
    </div>

    <!-- Layer 3: Dynamic Product Container -->
    <div id="products-container"></div>

    <!-- Layer 4: Foreground (Embers/Sparks) -->
    <div id="foreground-layer">
      <div class="particle-layer"></div>
    </div>

    <!-- Layer 5: UI Overlay -->
    <div id="ui-layer">
      <div class="brand-tagline">
        <i>"We're more than just a dispensary."</i>
      </div>
      <div class="northeast-logo">
        <h1 class="logo-text">NORTHEAST ALTERNATIVES</h1>
      </div>
    </div>
  </div>

  <script src="animation.js?v=xyz123"></script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function () {
        navigator.serviceWorker.register('./sw.js')
          .then(function (reg) { console.log('[PWA] SW registered:', reg.scope); })
          .catch(function (err) { console.warn('[PWA] SW registration failed:', err); });
      });
    }
  </script>
</body>
</html>
